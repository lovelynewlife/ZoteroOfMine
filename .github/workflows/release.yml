name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build Zotero plugin (.xpi)
  build-plugin:
    name: Build Zotero Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zoteroofmine-xpi
          path: build/zoteroofmine.xpi
          retention-days: 1

  # Build CLI binaries on multiple platforms
  build-cli:
    name: Build CLI on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            executable: zcli
            mcp_executable: zcli-mcp
          - os: windows-latest
            platform: windows
            executable: zcli.exe
            mcp_executable: zcli-mcp.exe
          - os: macos-latest
            platform: macos
            executable: zcli
            mcp_executable: zcli-mcp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: cli
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if command -v make >/dev/null 2>&1; then
            make deps
          else
            pip install -e ".[dev,mcp]"
          fi

      - name: Run tests
        working-directory: cli
        shell: bash
        run: |
          if command -v make >/dev/null 2>&1; then
            make test-unit
          else
            pytest tests/ -v
          fi

      - name: Build onefile (single executable)
        working-directory: cli
        shell: bash
        run: |
          if command -v make >/dev/null 2>&1; then
            make clean
            make build PYINSTALLER_MODE=onefile
            make build-mcp PYINSTALLER_MODE=onefile
          else
            pyinstaller --onefile --name zcli \
              --paths src \
              --hidden-import zotero_cli \
              --hidden-import zotero_cli.main \
              --hidden-import zotero_cli.config \
              --hidden-import zotero_cli.models \
              --hidden-import zotero_cli.database \
              --hidden-import zotero_cli.commands \
              --exclude-module pytest \
              --exclude-module tests \
              entrypoint.py

            pyinstaller --onefile --name zcli-mcp \
              --paths src \
              --hidden-import zotero_cli \
              --hidden-import zotero_cli.mcp_server \
              --hidden-import zotero_cli.config \
              --hidden-import zotero_cli.database \
              --hidden-import zotero_cli.models \
              --hidden-import zotero_cli.commands \
              --hidden-import mcp \
              --hidden-import mcp.server.fastmcp \
              --exclude-module pytest \
              --exclude-module tests \
              entrypoint_mcp.py
          fi

      - name: Test onefile executable
        working-directory: cli
        shell: bash
        run: |
          ./dist/${{ matrix.executable }} --help
          ./dist/${{ matrix.executable }} --version

      - name: Test onefile MCP executable
        working-directory: cli
        shell: bash
        run: |
          test -f ./dist/${{ matrix.executable }}
          python - <<'PY'
          import anyio
          from mcp import ClientSession
          from mcp.client.stdio import StdioServerParameters, stdio_client

          server_cmd = "./dist/${{ matrix.mcp_executable }}"

          async def main():
              params = StdioServerParameters(command=server_cmd, args=[])
              async with stdio_client(params) as (read_stream, write_stream):
                  async with ClientSession(read_stream, write_stream) as session:
                      await session.initialize()
                      tools = await session.list_tools()
                      names = {tool.name for tool in tools.tools}
                      required = {
                          "zcli_search_items",
                          "zcli_get_item",
                          "zcli_list_collections",
                          "zcli_list_tags",
                          "zcli_show_config",
                          "zcli_init_config",
                          "zcli_set_data_dir",
                      }
                      missing = required - names
                      if missing:
                          raise RuntimeError(f"Missing tools: {sorted(missing)}")
                      print("MCP tools ok:", sorted(names))

          anyio.run(main)
          PY

      - name: Save onefile artifacts
        working-directory: cli
        shell: bash
        run: |
          mkdir -p build-out/onefile
          cp dist/${{ matrix.executable }} build-out/onefile/
          cp dist/${{ matrix.mcp_executable }} build-out/onefile/

      - name: Build onedir (faster startup)
        working-directory: cli
        shell: bash
        run: |
          make clean
          make build PYINSTALLER_MODE=onedir
          make build-mcp PYINSTALLER_MODE=onedir

      - name: Package onedir
        working-directory: cli
        shell: bash
        run: |
          mkdir -p build-out/onedir
          if [ "${{ matrix.platform }}" = "windows" ]; then
            zip -r build-out/onedir/zcli-${{ matrix.platform }}-x64-onedir.zip dist/zcli/ dist/zcli-mcp/
          else
            tar -czf build-out/onedir/zcli-${{ matrix.platform }}-x64-onedir.tar.gz -C dist zcli/ zcli-mcp/
          fi

      - name: Upload onefile artifact
        uses: actions/upload-artifact@v4
        with:
          name: zcli-${{ matrix.platform }}-onefile
          path: |
            cli/build-out/onefile/${{ matrix.executable }}
            cli/build-out/onefile/${{ matrix.mcp_executable }}
          retention-days: 1

      - name: Upload onedir artifact
        uses: actions/upload-artifact@v4
        with:
          name: zcli-${{ matrix.platform }}-onedir
          path: |
            cli/build-out/onedir/*
          retention-days: 1

  # Create GitHub Release with all artifacts
  release:
    name: Create Release
    needs: [build-plugin, build-cli]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: zoteroofmine-xpi
          path: artifacts/plugin

      - name: Download Linux onefile artifact
        uses: actions/download-artifact@v4
        with:
          name: zcli-linux-onefile
          path: artifacts/linux/onefile

      - name: Download Linux onedir artifact
        uses: actions/download-artifact@v4
        with:
          name: zcli-linux-onedir
          path: artifacts/linux/onedir

      - name: Download Windows onefile artifact
        uses: actions/download-artifact@v4
        with:
          name: zcli-windows-onefile
          path: artifacts/windows/onefile

      - name: Download Windows onedir artifact
        uses: actions/download-artifact@v4
        with:
          name: zcli-windows-onedir
          path: artifacts/windows/onedir

      - name: Download macOS onefile artifact
        uses: actions/download-artifact@v4
        with:
          name: zcli-macos-onefile
          path: artifacts/macos/onefile

      - name: Download macOS onedir artifact
        uses: actions/download-artifact@v4
        with:
          name: zcli-macos-onedir
          path: artifacts/macos/onedir

      - name: Prepare release assets
        run: |
          mkdir -p release
          mv artifacts/plugin/zoteroofmine.xpi release/
          # Onefile (single executable)
          mv artifacts/linux/onefile/zcli release/zcli-linux-x64
          mv artifacts/linux/onefile/zcli-mcp release/zcli-mcp-linux-x64
          mv artifacts/windows/onefile/zcli.exe release/zcli-windows-x64.exe
          mv artifacts/windows/onefile/zcli-mcp.exe release/zcli-mcp-windows-x64.exe
          mv artifacts/macos/onefile/zcli release/zcli-macos-x64
          mv artifacts/macos/onefile/zcli-mcp release/zcli-mcp-macos-x64
          # Onedir (faster startup, compressed)
          mv artifacts/linux/onedir/*.tar.gz release/
          mv artifacts/windows/onedir/*.zip release/
          mv artifacts/macos/onedir/*.tar.gz release/
          chmod +x release/zcli-linux-x64 release/zcli-macos-x64 release/zcli-mcp-linux-x64 release/zcli-mcp-macos-x64

      - name: Create SHA256 checksums
        working-directory: release
        run: sha256sum * > checksums.txt

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## ZoteroOfMine ${{ steps.get_version.outputs.VERSION }}
            
            ### Zotero Plugin
            | File | Description |
            |------|-------------|
            | `zoteroofmine.xpi` | Zotero 7 plugin, install via Tools > Add-ons |
            
            ### CLI Tool (zcli)
            Two formats are available:

            | Format | File | Description | Startup Speed |
            |--------|------|-------------|---------------|
            | Onefile (single executable) | `zcli-<platform>-x64` | Easy installation, single file | Slower (needs decompression on every run) |
            | Onedir (directory) | `zcli-<platform>-x64-onedir.{tar.gz/zip}` | Faster, recommended for frequent use | Fast (no decompression) |

            ### Checksums
            See `checksums.txt` for SHA256 checksums.

            ### Installation

            **Zotero Plugin:**
            1. Download `zoteroofmine.xpi`
            2. In Zotero: Tools → Add-ons → Gear icon → Install Add-on From File

            **CLI Tool - Onefile (easy install):**
            ```bash
            # Linux/macOS
            chmod +x zcli-linux-x64   # or zcli-macos-x64
            sudo mv zcli-linux-x64 /usr/local/bin/zcli
            ```

            **CLI Tool - Onedir (faster startup):**
            ```bash
            # Linux/macOS
            tar -xzf zcli-linux-x64-onedir.tar.gz -C /tmp
            sudo mkdir -p /usr/local/share/zcli
            sudo cp -a /tmp/zcli /usr/local/share/zcli
            sudo cp -a /tmp/zcli-mcp /usr/local/share/zcli-mcp
            sudo ln -sf /usr/local/share/zcli/zcli /usr/local/bin/zcli
            sudo ln -sf /usr/local/share/zcli-mcp/zcli-mcp /usr/local/bin/zcli-mcp
            ```

            **MCP Server:**
            ```bash
            # Linux/macOS (onefile)
            chmod +x zcli-mcp-linux-x64   # or zcli-mcp-macos-x64
            sudo mv zcli-mcp-linux-x64 /usr/local/bin/zcli-mcp
            codex mcp add zcli -- zcli-mcp
            ```

            ```powershell
            # Windows
            # Add zcli.exe to your PATH
            ```
          files: release/*
          draft: false
          prerelease: false
