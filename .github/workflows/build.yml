# 此文件需要手动上传到 GitHub
# 因为 PAT 缺少 workflow 权限
name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - win
          - mac
          - linux

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build Electron for ${{ matrix.platform }}
        run: pnpm build:ui:${{ matrix.platform }}
        working-directory: src/chatui

      - name: Copy Electron to addon
        run: |
          mkdir -p addon/vibe-research/${{ matrix.platform }}
          if [ "${{ matrix.platform }}" = "win" ]; then
            cp -r src/chatui/dist-electron/win-unpacked/* addon/vibe-research/win/
          elif [ "${{ matrix.platform }}" = "mac" ]; then
            cp -r src/chatui/dist-electron/mac* addon/vibe-research/
          else
            cp -r src/chatui/dist-electron/linux-unpacked/* addon/vibe-research/linux/
          fi
        shell: bash

      - name: Build Zotero Plugin
        run: pnpm build-prod

      - name: Rename XPI
        run: mv build/zoteroofmine.xpi build/zoteroofmine-${{ matrix.platform }}.xpi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zoteroofmine-${{ matrix.platform }}
          path: build/zoteroofmine-${{ matrix.platform }}.xpi

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.xpi
