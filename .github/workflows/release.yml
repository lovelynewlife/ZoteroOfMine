name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build Zotero plugin (.xpi)
  build-plugin:
    name: Build Zotero Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zoteroofmine-xpi
          path: build/zoteroofmine.xpi
          retention-days: 1

  # Build CLI binaries on multiple platforms
  build-cli:
    name: Build CLI on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            executable: zcli
          - os: windows-latest
            platform: windows
            executable: zcli.exe
          - os: macos-latest
            platform: macos
            executable: zcli

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: cli
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if command -v make >/dev/null 2>&1; then
            make deps
          else
            pip install -e ".[dev]"
          fi

      - name: Run tests
        working-directory: cli
        shell: bash
        run: |
          if command -v make >/dev/null 2>&1; then
            make test-unit
          else
            pytest tests/ -v
          fi

      - name: Build executable
        working-directory: cli
        shell: bash
        run: |
          if command -v make >/dev/null 2>&1; then
            make build
          else
            pyinstaller --onefile --name zcli \
              --paths src \
              --hidden-import zotero_cli \
              --hidden-import zotero_cli.main \
              --hidden-import zotero_cli.config \
              --hidden-import zotero_cli.models \
              --hidden-import zotero_cli.database \
              --hidden-import zotero_cli.commands \
              --exclude-module pytest \
              --exclude-module tests \
              entrypoint.py
          fi

      - name: Test executable
        working-directory: cli
        shell: bash
        run: |
          ./dist/${{ matrix.executable }} --help
          ./dist/${{ matrix.executable }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zcli-${{ matrix.platform }}
          path: cli/dist/${{ matrix.executable }}
          retention-days: 1

  # Create GitHub Release with all artifacts
  release:
    name: Create Release
    needs: [build-plugin, build-cli]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: zoteroofmine-xpi
          path: artifacts/plugin

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: zcli-linux
          path: artifacts/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: zcli-windows
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: zcli-macos
          path: artifacts/macos

      - name: Prepare release assets
        run: |
          mkdir -p release
          mv artifacts/plugin/zoteroofmine.xpi release/
          mv artifacts/linux/zcli release/zcli-linux-x64
          mv artifacts/windows/zcli.exe release/zcli-windows-x64.exe
          mv artifacts/macos/zcli release/zcli-macos-x64
          chmod +x release/zcli-linux-x64 release/zcli-macos-x64

      - name: Create SHA256 checksums
        working-directory: release
        run: sha256sum * > checksums.txt

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## ZoteroOfMine ${{ steps.get_version.outputs.VERSION }}
            
            ### Zotero Plugin
            | File | Description |
            |------|-------------|
            | `zoteroofmine.xpi` | Zotero 7 plugin, install via Tools > Add-ons |
            
            ### CLI Tool (zcli)
            | Platform | File |
            |----------|------|
            | Linux (x64) | `zcli-linux-x64` |
            | Windows (x64) | `zcli-windows-x64.exe` |
            | macOS (x64) | `zcli-macos-x64` |
            
            ### Checksums
            See `checksums.txt` for SHA256 checksums.
            
            ### Installation
            
            **Zotero Plugin:**
            1. Download `zoteroofmine.xpi`
            2. In Zotero: Tools → Add-ons → Gear icon → Install Add-on From File
            
            **CLI Tool:**
            ```bash
            # Linux/macOS
            chmod +x zcli-*
            sudo mv zcli-* /usr/local/bin/zcli
            ```
            
            ```powershell
            # Windows
            # Add zcli.exe to your PATH
            ```
          files: release/*
          draft: false
          prerelease: false
