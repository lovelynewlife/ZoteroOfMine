<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<vbox
  id="zotero-prefpane-__addonRef__"
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window: window })"
>
  <!-- Reading History Settings -->
  <groupbox>
    <label><html:h2 data-l10n-id="pref-history-title"></html:h2></label>
    <description data-l10n-id="pref-history-description" style="color: GrayText; margin-bottom: 8px;" />
    <checkbox
      id="zotero-prefpane-__addonRef__-history-showInSidebar"
      preference="extensions.zotero.__addonRef__.history.showInSidebar"
      data-l10n-id="pref-history-showInSidebar"
    />
    <hbox align="center" style="margin-top: 8px;">
      <label
        id="zotero-prefpane-__addonRef__-history-cooldown-label"
        data-l10n-id="pref-history-cooldown"
      />
      <button
        id="zotero-prefpane-__addonRef__-history-cooldown-decrease"
        label="-"
        style="min-width: 30px; margin-left: 8px;"
      />
      <html:input
        type="number"
        id="zotero-prefpane-__addonRef__-history-cooldown"
        readonly="true"
        size="5"
        style="width: 70px; text-align: center; margin-left: 4px; margin-right: 4px; -moz-appearance: textfield;"
      />
      <button
        id="zotero-prefpane-__addonRef__-history-cooldown-increase"
        label="+"
        style="min-width: 30px;"
      />
      <label data-l10n-id="pref-history-cooldown-unit" style="margin-left: 4px;" />
    </hbox>
  </groupbox>
</vbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
