name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Build Zotero plugin (.xpi)
  build-plugin:
    name: Build Zotero Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify build
        run: |
          ls -la build/
          test -f build/zoteroofmine.xpi && echo "✅ zoteroofmine.xpi created successfully"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zoteroofmine-xpi
          path: build/zoteroofmine.xpi
          retention-days: 7

  # Test CLI on multiple platforms
  test-cli:
    name: Test CLI on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: cli
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if command -v make >/dev/null 2>&1; then
            make deps
          else
            pip install -e ".[dev,mcp]"
          fi

      - name: Run tests
        working-directory: cli
        shell: bash
        run: |
          if command -v make >/dev/null 2>&1; then
            make test-unit
          else
            pytest tests/ -v
          fi

      - name: Test CLI commands
        working-directory: cli
        shell: bash
        run: |
          if command -v make >/dev/null 2>&1; then
            make test
          else
            zcli --help
            zcli --version
            zcli config --help
          fi

      - name: Test MCP server
        working-directory: cli
        shell: bash
        run: |
          if command -v make >/dev/null 2>&1; then
            make test-mcp
          else
            PYTHONPATH=src python -c "import anyio; from zotero_cli.mcp_server import create_server; s=create_server(); print([t.name for t in anyio.run(s.list_tools)])"
          fi
